<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-A-Miller</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Arial Black', sans-serif; 
            background: #1a1a1a; 
            color: #ffcc00; 
            user-select: none;
            margin: 0;
            padding: 20px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }

        h1 { margin-top: 0; text-transform: uppercase; letter-spacing: 2px; }

        /* 3x3 Grid */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 110px); 
            grid-template-rows: repeat(3, 110px);
            gap: 15px; 
            justify-content: center; 
        }

        /* Responsive scaling for bigger screens */
        @media(min-width: 600px) {
            .grid { 
                grid-template-columns: repeat(3, 180px); 
                grid-template-rows: repeat(3, 180px); 
            }
            .hole { width: 180px !important; height: 180px !important; }
            .miller { width: 160px !important; bottom: -180px !important; }
        }

        .hole { 
            width: 110px; 
            height: 110px; 
            background: #333; 
            border-radius: 50%; 
            border: 4px solid #555; 
            position: relative; 
            overflow: hidden; 
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.5);
        }
        
        .miller { 
            width: 300px; 
            position: absolute; 
            bottom: -120px; 
            left: 50%;
            transform: translateX(-50%);
            transition: bottom 0.1s ease-out; 
            cursor: crosshair;
        }

        .miller.up { 
            bottom: 5px; 
        }

        #game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border: 5px solid #ffcc00;
            z-index: 10;
        }

        button {
            background: #ffcc00;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.2em;
        }
    </style>
</head>
<body>

    <h1>Whack-A-Miller</h1>

    <div class="stats">
        <div>Score: <span id="score">0</span></div>
        <div>Time: <span id="timer">30</span>s</div>
    </div>

    <div class="grid">
        <div class="hole"><img src="miller.png" class="miller" onclick="whack(this)"></div>
        <div class="hole"><img src="miller.png" class="miller" onclick="whack(this)"></div>
        <div class="hole"><img src="miller.png" class="miller" onclick="whack(this)"></div>
        <div class="hole"><img src="miller.png" class="miller" onclick="whack(this)"></div>
        <div class="hole"><img src="miller.png" class="miller" onclick="whack(this)"></div>
        <div class="hole"><img src="miller.png" class="miller" onclick="whack(this)"></div>
        <div class="hole"><img src="miller.png" class="miller" onclick="whack(this)"></div>
        <div class="hole"><img src="miller.png" class="miller" onclick="whack(this)"></div>
        <div class="hole"><img src="miller.png" class="miller" onclick="whack(this)"></div>
    </div>

    <div id="game-over">
        <h2>TIME'S UP!</h2>
        <p>Final Score: <span id="final-score">0</span></p>
        <button onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <script>
        const faces = document.querySelectorAll('.miller');
        const scoreBoard = document.querySelector('#score');
        const timerBoard = document.querySelector('#timer');
        const gameOverScreen = document.querySelector('#game-over');
        const finalScoreBoard = document.querySelector('#final-score');
        
        let score = 0;
        let lastFace;
        let timeLeft = 30;
        let gameActive = true;

        function randomFace(faces) {
            const idx = Math.floor(Math.random() * faces.length);
            const face = faces[idx];
            if (face === lastFace) return randomFace(faces);
            lastFace = face;
            return face;
        }

        function popUp() {
            if (!gameActive) return;
            
            const time = Math.random() * (1000 - 400) + 400;
            const face = randomFace(faces);
            face.classList.add('up');
            
            setTimeout(() => {
                face.classList.remove('up');
                if (gameActive) popUp(); 
            }, time);
        }

        function whack(e) {
            if (!gameActive) return;
            score++;
            scoreBoard.textContent = score;
            e.classList.remove('up');
            
            // Visual feedback: flash hole background
            e.parentElement.style.background = '#555';
            setTimeout(() => e.parentElement.style.background = '#333', 100);
        }

        function startTimer() {
            const countdown = setInterval(() => {
                timeLeft--;
                timerBoard.textContent = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            finalScoreBoard.textContent = score;
            gameOverScreen.style.display = 'block';
        }

        // Start!
        startTimer();
        popUp();
    </script>
</body>
</html>
